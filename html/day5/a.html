<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гіперпосилання</title>
  </head>
  <body>
    <h1>Приклади гіперпосилань</h1>

    <ul>
      <li><a></a></li>
      <li><a href=""></a></li>
      <li><a>Порожнє гіперпосилання</a></li>
      <li>
        Посилання на
        <a href="">поточну (цю)</a>
        сторінку
      </li>
      <li>
        <!-- Для переходу на інший сайт обов'язково 
        вказувати протокол (https) -->
        <a href="https://google.com">Google</a>
      </li>
      <li>
        <!-- Без протоколу (https) посилання буде вести
        на сторінку ПОТОЧНОГО сайту,
        у даному випадку, на файл google.com.ua 
        у папці day5 -->
        <a href="google.com.ua">Google</a> (працює, але не так як здається)
      </li>
      <li>
        <!-- У такому записі пошук файла task1.html
        виконується у поточній папці, тобто day5.
        Оскільки такого файла немає у day5,
        то браузер покаже помилку -->
        <a href="task1.html">Завдання 1</a> (не працює)
      </li>
      <li>
        <!-- Символи "../" дозволяють "вийти" з поточної папки
        (з папки day5 в папку html)
        щоб "зайти" у сусідню папку (також в html)
        і знайти потрібний файл -->
        <a href="../day2/task1.html">Завдання 1</a> (працює)
      </li>
      <li></li>
    </ul>
  </body>
</html>
