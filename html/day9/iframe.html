<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вбудовані сторінки</title>
  </head>
  <body>
    <h2>Сторінка власного проєкту</h2>

    <!-- Файл iframe.html знаходиться у папці day9.
      Файл tables.html знаходиться у папці day4.
      Щоб підключити tables.html в iframe.html потрібно:
      1. Вийти з папки day9 - "../" (опиняємося у папці html)
      2. Зайти в папку day4 - "day4/" 
      3. Обриємо (вказуємо) потрібний файл tables.html -->
    <iframe
      src="../day4/tables.html"
      frameborder="1"
      width="100%"
      height="500px"
    ></iframe>

    <!-- Відносний шлях: 
     ../day4/tables.html - шлях відносно 
     вмісту папки day9, day1, тощо
     
     Абсолютний шлях:
     C:\Users\<user>\Desktop\web\study\html\day4\tables.html
     D:\Desktop\web\study\html\day4\tables.html - розташування 
     файлу tables.html на комп'ютері
     
     Ми в проєктах будемо використовувати відносні шляхи -->

    <h2>Відео з YouTube</h2>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/SH4LZDwCojU?si=PKAoIolu-CmYNFGr"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h2>Відео з vimeo</h2>

    <iframe
      title="vimeo-player"
      src="https://player.vimeo.com/video/112836958?h=d4a3a50265"
      width="640"
      height="360"
      frameborder="0"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="
        autoplay;
        fullscreen;
        picture-in-picture;
        clipboard-write;
        encrypted-media;
        web-share;
      "
      allowfullscreen
    ></iframe>

    <h2>Карта Google</h2>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2531.246371056954!2d26.235032875759927!3d50.622539874959116!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x472f6cae1b770e81%3A0xe8d009fbf33a2a3f!2z0KDRltCy0L3QtdC90YHRjNC60LjQuSDRhtC10L3RgtGAINC_0YDQvtGE0LXRgdGW0LnQvdC-LdGC0LXRhdC90ZbRh9C90L7RlyDQvtGB0LLRltGC0Lgg0LTQtdGA0LbQsNCy0L3QvtGXINGB0LvRg9C20LHQuCDQt9Cw0LnQvdGP0YLQvtGB0YLRlg!5e0!3m2!1suk!2sua!4v1780654420713!5m2!1suk!2sua"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
