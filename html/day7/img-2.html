<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Зображення 2</title>
  </head>
  <body>
    <img src="images/cat-2.jpg" alt="Коти в окулярах" width="100%" />

    <h3>Для зображень по горизонталі задаємо висоту без ширини</h3>

    <p>
      <!-- Для задання висоти використовуємо переважно
         пікселі або vh - висота відносно екрану -->
      <img src="images/cat-1.jpg" height="150px" alt="Кошеня на ліжку" />
      <img src="images/cat-2.jpg" height="150px" alt="Коти в окулярах" />
      <img src="images/cat-3.jpg" height="150px" alt="Кіт з клавіатурою" />
    </p>

    <h3>Для зображень по вертикалі задаємо ширину без висоти</h3>

    <p>
      <!-- Для задання ширини використовуємо переважно
         % або vw - ширина відносно екрану -->
      <img src="images/cat-1.jpg" width="55%" alt="Кошеня на ліжку" />
      <img src="images/cat-2.jpg" width="55%" alt="Коти в окулярах" />
      <img src="images/cat-3.jpg" width="55%" alt="Кіт з клавіатурою" />
    </p>

    <h3>Зображення НЕ є блочним елементом</h3>

    <p>
      Тут поруч буде зображення.
      <img src="../day6/small-red-cat.jpg" width="5%" alt="Мале руде кошеня" />
      Ось вже було.
    </p>

    <p>Тут поруч буде зображення.</p>
    <p>
      <img src="../day6/small-red-cat.jpg" width="5%" alt="Мале руде кошеня" />
    </p>
    <p>Ось вже було.</p>
  </body>
</html>
