<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position</title>

    <link rel="stylesheet" href="position.css" />
  </head>
  <body>
    <div>Зображення тут немає</div>

    <div>
      <div class="default-position">
        Розташування зображення за замовчуванням
        <!-- Браузер залишає на сторінці місце 
         під зображення, оскільки position: relative,
         але саме зображення відобрадає зі зміщенням
         top і left відповідно
         Така поведінка можлива для будь-якого елемента
         із зміненою властивістю position: relative -->
        <img
          class="relative"
          src="../../html/day7/images/cat-2.jpg"
          alt="Доброго вечора"
        />
      </div>
    </div>

    <div>Зображення тут немає</div>

    <!-- Браузер НЕ залишає місце на сторінці,
     контейнер "напливає" на наступний елемент -->
    <div class="fixed">Фіксований контейнер</div>

    <div>Звичайний контейнер</div>

    <div class="sticky">Закріплений контейнер</div>

    <div>Звичайний контейнер</div>

    <div>
      <div class="default-position relative-div">
        Розташування зображення за замовчуванням
        <!-- Браузер НЕ залишає для зображення
         місце на сторінці, зображення "виривається"
         з потоку і відображається поверх решти елементів -->
        <img
          class="absolute"
          src="../../html/day7/images/cat-2.jpg"
          alt="Доброго вечора"
        />
      </div>
    </div>

    <div class="up">
      <a href="#">⬆️</a>
    </div>
  </body>
</html>
