<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Псевдокласи гіперпосилань</title>

    <link rel="stylesheet" href="pseudo-class-a.css" />
  </head>
  <body>
    <!-- nav - блочний контейнер (аналог div), 
     призначений для групування гіперпосилань.
     Не виконує жодної додаткової функції окрім 
     задання контексту -->
    <nav>
      <ul>
        <li><a href="#section-1">Розділ 1</a></li>
        <li><a href="#section-2">Розділ 2</a></li>
        <li><a href="#section-3">Розділ 3</a></li>
      </ul>
    </nav>

    <!-- section - блочний контейнер (аналог div),
     призначений для групування елементів пов'язаних
     певним контекстом.
     Не виконує жодної додаткової функції окрім 
     групування -->
    <section id="section-1">
      <h2>Розділ 1</h2>
      <p>Текст розділу 1</p>
    </section>

    <section id="section-2">
      <h2>Розділ 2</h2>
      <p>Текст розділу 2</p>
    </section>

    <section id="section-3">
      <h2>Розділ 3</h2>
      <p>Текст розділу 3</p>
    </section>
  </body>
</html>
