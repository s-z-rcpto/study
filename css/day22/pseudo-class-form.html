<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Псевдокласи елементів форми</title>

    <link rel="stylesheet" href="pseudo-class-form.css" />
  </head>
  <body>
    <form action="#">
      <p title="Поле обов'язкове для заповнення">
        <label for="name">
          Ім'я
          <span class="required">*</span>
        </label>

        <input
          type="text"
          id="name"
          name="name"
          placeholder="Serhii"
          required
        />
      </p>

      <p title="Поле обов'язкове для заповнення">
        <label for="email">
          Електронна пошта
          <span class="required">*</span>
        </label>

        <input
          type="email"
          id="email"
          name="email"
          placeholder="serhii@site.com"
          required
        />
      </p>

      <p>
        <label for="locked"> Заблоковане поле </label>

        <input
          type="text"
          id="locked"
          name="locked"
          value="Редагування недоступне"
          disabled
        />
      </p>

      <p>
        <label for="readonly"> Тільки для читання </label>

        <input
          type="text"
          id="readonly"
          name="readonly"
          value="Редагування недоступне"
          readonly
        />
      </p>

      <p>
        <input type="checkbox" id="agree" name="agree" />
        <label for="agree"> Погоджуюсь з умовами </label>
      </p>

      <button type="submit">Надіслати</button>
    </form>
  </body>
</html>
