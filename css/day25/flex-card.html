<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Картка новини/товару</title>

    <link rel="stylesheet" href="flex-card.css" />
  </head>
  <body>
    <main>
      <div class="news">
        <div class="news-image">
          <img
            src="https://img.mezha.ua/mezha/images/doc/0/7/315375/074d2fae269e4283458239dc9f697613.jpeg?w=220&q=90&f=webp"
            alt="Ілюстрація новини"
          />
        </div>

        <div class="news-data">
          <h3>
            <a href="#">
              Apple терміново випустила оновлення безпеки для iPhone та Mac
              через загрозу ШІ-атак
            </a>
          </h3>

          <p>
            <a href="#"><b>Софт</b></a>
            <a href="#">Мирослав Трінько</a>
            <span>30 червня, 09:05</span>
          </p>
        </div>
      </div>

      <hr />

      <div class="goods">
        <img src="../../html/day7/images/cat-3.jpg" alt="Товар або послуга" />
        <p>Професійний набір текстів</p>

        <p class="price">
          <span>500</span>
          <span>₴&nbsp;/&nbsp;год</span>
        </p>

        <div class="order">
          <button>+</button>
          <span>0</span>
          <button>&ndash;</button>
        </div>
      </div>

      <hr />

      <div class="goods flex">
        <img
          src="../../html/day7/images/cat-3.jpg"
          alt="Ілюстративне зображення послуги"
        />

        <div class="data">
          <p>Професійний набір текстів</p>

          <div>
            <p class="price">
              <span>500</span>
              <span>₴&nbsp;/&nbsp;год</span>
            </p>

            <div class="order">
              <button>+</button>
              <span>0</span>
              <button>&ndash;</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
